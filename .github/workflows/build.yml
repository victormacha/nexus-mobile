name: Build APK

on:
  workflow_dispatch:      # permite rodar manualmente pelo botão "Run workflow"
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências de sistema (necessárias pro p4a compilar)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev automake build-essential \
            libltdl-dev

      - name: Instalar buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache do buildozer (acelera builds futuros)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Gerar APK
        run: |
          yes | buildozer android debug

      - name: Subir o APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: bin/*.apk
