name: Build APK — Nexus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev aidl ccache \
            python3.11 python3.11-dev python3.11-venv

      - name: Configurar Python 3.11
        run: |
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 2
          sudo update-alternatives --set python3 /usr/bin/python3.11
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 2
          sudo update-alternatives --set python /usr/bin/python3.11
          sudo rm -f /usr/bin/python3.14 || true
          curl -sS https://bootstrap.pypa.io/get-pip.py | sudo python3.11
          python3 --version

      - name: Instalar Buildozer e p4a
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer==1.5.0 "Cython==0.29.37"
          pip3 install python-for-android==2024.1.21

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: nexus-v9-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer -v android debug 2>&1 | tail -400

      - name: Listar bin/
        if: always()
        run: ls -la bin/ 2>/dev/null || echo "bin/ nao encontrada"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-debug.apk
          path: bin/*.apk
          if-no-files-found: warn
