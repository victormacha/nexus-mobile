name: Build APK — Nexus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.14"

      - name: Verificar Python
        run: python --version

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            aidl ccache

      - name: Instalar Buildozer e Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.5.0
          python -m pip install "cython==0.29.37"

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-ubuntu22-py310-ndk25b-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-ubuntu22-py310-ndk25b-v2-

      - name: Build APK
        run: |
          yes | buildozer -v android debug 2>&1 | tail -300

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-debug.apk
          path: bin/*.apk
          if-no-files-found: error
