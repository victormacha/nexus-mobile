name: Build APK — Nexus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remover Python 3.12+ completamente
        run: |
          sudo apt-get remove -y python3.12 python3.13 python3.14 || true
          sudo apt-get autoremove -y || true
          sudo find /usr -name "python3.1*" -delete || true
          sudo find /opt -name "python3.1*" -delete || true
          sudo find /tmp -name "python3.1*" -delete || true

      - name: Instalar Python 3.11
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3.11 python3.11-dev python3.11-venv
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 99
          sudo update-alternatives --set python3 /usr/bin/python3.11
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 99
          sudo update-alternatives --set python /usr/bin/python3.11
          sudo ln -sf /usr/bin/python3.11 /usr/local/bin/python3
          sudo ln -sf /usr/bin/python3.11 /usr/local/bin/python
          curl -sS https://bootstrap.pypa.io/get-pip.py | sudo python3.11
          python3 --version
          which python3

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev aidl ccache

      - name: Instalar Buildozer
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install buildozer==1.5.0 "Cython==0.29.37"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: nexus-v10-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer -v android debug 2>&1 | tail -400

      - name: Listar bin/
        if: always()
        run: ls -la bin/ 2>/dev/null || echo "bin/ nao encontrada"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-debug.apk
          path: bin/*.apk
          if-no-files-found: warn
