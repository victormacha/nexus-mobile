name: Build APK — Nexus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remover Python 3.14 do sistema
        run: |
          sudo apt-get remove -y python3.14 python3.14-dev python3.14-minimal || true
          sudo apt-get autoremove -y || true

      - name: Instalar Python 3.11 como padrão do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3.11 python3.11-dev python3.11-venv python3.11-distutils
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          sudo ln -sf /usr/bin/python3.11 /usr/bin/python
          python --version
          python3 --version

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            aidl ccache

      - name: Instalar pip e Buildozer
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
          python3.11 -m pip install --upgrade pip setuptools wheel
          python3.11 -m pip install buildozer==1.5.0 "Cython<3.0"

      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-py311-${{ hashFiles('buildozer.spec') }}-v5
          restore-keys: buildozer-${{ runner.os }}-py311-

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          yes | python3.11 -m buildozer -v android debug 2>&1 | tail -300

      - name: Listar bin/
        if: always()
        run: ls -la bin/ || echo "Pasta bin/ nao encontrada"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-debug.apk
          path: bin/*.apk
          if-no-files-found: warn
