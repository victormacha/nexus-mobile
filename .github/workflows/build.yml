name: Build APK — Nexus

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite rodar manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # 1 — Baixa o repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Python 3.10 (Buildozer exige <= 3.11)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3 — Dependências do sistema necessárias para o Android SDK/NDK
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache

      # 4 — Buildozer + Cython
      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      # 5 — Cache do Android SDK/NDK (economiza ~20 min nas próximas builds)
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 6 — Compila o APK (modo debug — não precisa de assinatura)
      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tail -100

      # 7 — Sobe o APK como artefato (fica disponível por 30 dias)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-debug.apk
          path: bin/*.apk
          if-no-files-found: error
